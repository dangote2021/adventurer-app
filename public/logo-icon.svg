<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </radialGradient>
    <linearGradient id="mountainFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6D7A7"/>
      <stop offset="100%" stop-color="#E2B47D"/>
    </linearGradient>
    <linearGradient id="mountainBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A373"/>
      <stop offset="100%" stop-color="#B08457"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A03F"/>
      <stop offset="100%" stop-color="#D65A1A"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="244"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="244" fill="url(#bg)"/>

  <g clip-path="url(#circleClip)">
    <!-- Sun with rays -->
    <g>
      <g stroke="#F9A03F" stroke-width="5" stroke-linecap="round" opacity="0.85">
        <line x1="175" y1="80"  x2="175" y2="112"/>
        <line x1="105" y1="150" x2="130" y2="165"/>
        <line x1="95"  y1="225" x2="125" y2="225"/>
        <line x1="225" y1="150" x2="215" y2="170"/>
        <line x1="120" y1="98"  x2="140" y2="120"/>
        <line x1="230" y1="98"  x2="212" y2="120"/>
        <line x1="110" y1="195" x2="135" y2="200"/>
        <line x1="245" y1="195" x2="220" y2="200"/>
      </g>
      <!-- Sun disk -->
      <circle cx="175" cy="190" r="46" fill="url(#sunGrad)"/>
    </g>

    <!-- Back mountain -->
    <path d="M 270 400 L 385 195 L 500 400 Z" fill="url(#mountainBack)"/>

    <!-- Front mountain (main peak) -->
    <path d="M 60 420 L 270 140 L 470 420 Z" fill="url(#mountainFront)"/>

    <!-- Snow cap on main peak -->
    <path d="M 243 180 L 270 140 L 297 180 L 285 195 L 275 188 L 265 198 L 255 190 Z" fill="#FFFFFF"/>

    <!-- Lake / water -->
    <path d="M 0 410 Q 256 450 512 410 L 512 470 Q 256 500 0 470 Z" fill="#1E6091" opacity="0.9"/>
    <path d="M 140 430 Q 200 440 260 430" stroke="#EAF4F4" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M 310 435 Q 360 443 410 435" stroke="#EAF4F4" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
</svg>

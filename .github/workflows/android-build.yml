name: Build Android AAB

# Déclencheurs :
#  - push sur main : build auto à chaque push applicatif
#  - manuel : bouton "Run workflow" dans l'onglet Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js static export + Capacitor sync
        run: npm run mobile:build
        env:
          CAPACITOR_BUILD: 'true'
          NEXT_PUBLIC_CAPACITOR_BUILD: 'true'

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/adventurer-upload.keystore
          ls -la android/adventurer-upload.keystore

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build signed AAB
        working-directory: android
        env:
          ADV_KS_PASSWORD: ${{ secrets.ADV_KS_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: adventurer-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/outputs/logs/
            android/build/
          retention-days: 7
          if-no-files-found: ignore
